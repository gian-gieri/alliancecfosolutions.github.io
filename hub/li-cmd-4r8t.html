<style>
:root {
  --navy: #1B3A5C;
  --gold: #C9963B;
  --bg: #0f1923;

  --card-border: #1e3348;
  --text: #e0e6ed;
  --text-muted: #8899aa;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --client: #f59e0b;
  --outsider: #3b82f6;
  --peer: #8b5cf6;
  --referral: #10b981;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
a { color: var(--gold); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Stats Bar */
.stats-bar {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, var(--navy), #0d2740);
  border-bottom: 2px solid var(--gold);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.stats-bar .brand { display: flex; align-items: center; gap: 12px; }
.stats-bar .brand h1 { font-size: 16px; color: var(--gold); white-space: nowrap; }
.stats-bar .brand .refreshed { font-size: 11px; color: var(--text-muted); }
.stats-grid { display: flex; gap: 16px; flex-wrap: wrap; }
.stat-card { text-align: center; min-width: 80px; }
.stat-card .num { font-size: 20px; font-weight: 700; color: #fff; }
.stat-card .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* Layout */
.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 24px 40px; max-width: 1600px; margin: 0 auto; }
@media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }

/* Panels */
.panel {
  background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px;
  display: flex; flex-direction: column; max-height: 80vh;
}
.panel-header {
  padding: 14px 18px; border-bottom: 1px solid var(--card-border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: var(--card-bg); border-radius: 10px 10px 0 0; z-index: 2;
}
.panel-header h2 { font-size: 15px; color: var(--gold); }
.panel-header .count { background: var(--navy); color: var(--gold); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.panel-body { overflow-y: auto; padding: 12px 18px; flex: 1; }

/* Cards */
.comment-card, .feed-card, .connection-card { background: #1a2d3f; border: 1px solid var(--card-border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-header .name { font-weight: 600; color: #fff; font-size: 14px; }
.card-header .title { font-size: 12px; color: var(--text-muted); }
.card-header .time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.card-header .cat { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
.cat-client { background: rgba(245,158,11,0.15); color: var(--client); }
.cat-outsider { background: rgba(59,130,246,0.15); color: var(--outsider); }
.cat-peer { background: rgba(139,92,246,0.15); color: var(--peer); }
.cat-referral { background: rgba(16,185,129,0.15); color: var(--referral); }
.post-ref { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-style: italic; }
.comment-text { font-size: 13px; margin-bottom: 10px; padding: 8px; background: #0f1923; border-radius: 6px; }
.snippet { font-size: 13px; margin-bottom: 8px; color: var(--text); }
.why { font-size: 12px; color: var(--gold); margin-bottom: 8px; font-style: italic; }
.stats-line { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }

/* Reply options */
.reply-options { display: flex; flex-direction: column; gap: 8px; }
.reply-option { background: #0f1923; border: 1px solid var(--card-border); border-radius: 6px; padding: 10px; }
.reply-option .tone { font-size: 11px; color: var(--gold); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; }
.reply-text { font-size: 13px; color: var(--text); outline: none; min-height: 20px; }
.reply-text:focus { border-left: 2px solid var(--gold); padding-left: 8px; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: #daa84d; }
.btn-outline { background: transparent; border: 1px solid var(--card-border); color: var(--text-muted); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

/* Post queue */
.queue-item { background: #1a2d3f; border: 1px solid var(--card-border); border-radius: 8px; margin-bottom: 10px; }
.queue-header { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.queue-header:hover { background: #1e3348; border-radius: 8px; }
.queue-date { font-size: 12px; color: var(--gold); font-weight: 600; min-width: 90px; }
.queue-title { font-size: 13px; color: #fff; flex: 1; margin: 0 12px; }
.queue-status { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
.status-draft { background: rgba(251,191,36,0.15); color: var(--warning); }
.status-ready { background: rgba(59,130,246,0.15); color: var(--outsider); }
.status-approved { background: rgba(52,211,153,0.15); color: var(--success); }
.status-posted { background: rgba(139,92,246,0.15); color: var(--peer); }
.queue-body { display: none; padding: 0 14px 14px; }
.queue-body.open { display: block; }
.queue-body .category-tag { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.queue-body .full-text { font-size: 13px; color: var(--text); white-space: pre-wrap; background: #0f1923; padding: 12px; border-radius: 6px; outline: none; }
.queue-body .full-text:focus { border-left: 2px solid var(--gold); }

/* Performance table */
.perf-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.perf-table th { text-align: left; color: var(--text-muted); font-size: 11px; text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--card-border); }
.perf-table td { padding: 10px; border-bottom: 1px solid #1a2d3f; }
.perf-table tr:hover td { background: #1a2d3f; }

/* Connection messages */
.conn-messages { margin-top: 8px; }
.conn-msg { background: #0f1923; border: 1px solid var(--card-border); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
.conn-msg .tone { font-size: 10px; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }
.conn-msg .msg-text { font-size: 12px; color: var(--text); outline: none; }
.conn-msg .msg-text:focus { border-left: 2px solid var(--gold); padding-left: 6px; }

/* Scrollbar */
.panel-body::-webkit-scrollbar { width: 6px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
.panel-body::-webkit-scrollbar-thumb:hover { background: var(--navy); }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Expand arrow */
.arrow { transition: transform 0.2s; display: inline-block; font-size: 12px; color: var(--text-muted); }
.arrow.open { transform: rotate(90deg); }

@media (max-width: 768px) {
  .stats-bar { padding: 10px 12px; }
  .stats-grid { gap: 8px; }
  .stat-card .num { font-size: 16px; }
  .dashboard { padding: 10px 12px; }
  .panel { max-height: none; }
}
</style>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar"></div>

<!-- Dashboard Grid -->
<div class="dashboard">
  <!-- Left Column -->
  <div>
    <div class="panel" id="commentsPanel"></div>
    <div class="panel" style="margin-top:16px" id="feedPanel"></div>
  </div>
  <!-- Right Column -->
  <div>
    <div class="panel" id="queuePanel"></div>
    <div class="panel" style="margin-top:16px" id="connectionsPanel"></div>
    <div class="panel" style="margin-top:16px" id="performancePanel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// RENDER ENGINE — reads DASHBOARD_DATA, builds everything
// ============================================================
const D = DASHBOARD_DATA;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text, url) {
  navigator.clipboard.writeText(text).then(() => {
    toast('📋 Copied to clipboard!');
    if (url) window.open(url, '_blank');
  });
}

function catClass(c) {
  if (c === 'client') return 'cat-client';
  if (c === 'outsider') return 'cat-outsider';
  if (c === 'referral') return 'cat-referral';
  return 'cat-peer';
}
function catLabel(c) {
  if (c === 'client') return '🎯 POTENTIAL CLIENT';
  if (c === 'outsider') return '🌐 RELEVANT OUTSIDER';
  if (c === 'referral') return '🤝 REFERRAL PARTNER';
  return '🤝 NETWORK PEER';
}
function statusClass(s) { return 'status-' + s; }

// Stats Bar
document.getElementById('statsBar').innerHTML = `
  <div class="brand">
    <h1>⚡ LinkedIn Command Center</h1>
    <span class="refreshed">Last refreshed: ${D.lastRefreshed}</span>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="num">${D.stats.followers.toLocaleString()}</div><div class="label">Followers</div></div>
    <div class="stat-card"><div class="num">${D.stats.impressions7d.toLocaleString()}</div><div class="label">7d Impressions</div></div>
    <div class="stat-card"><div class="num">${D.stats.profileViews}</div><div class="label">Profile Views</div></div>
    <div class="stat-card"><div class="num">${D.stats.searchAppearances}</div><div class="label">Search Appear.</div></div>
    <div class="stat-card"><div class="num">${D.stats.postsQueued}</div><div class="label">Posts Queued</div></div>
    <div class="stat-card"><div class="num">${D.stats.pendingReplies}</div><div class="label">Pending Replies</div></div>
  </div>
`;

// Comments Panel
document.getElementById('commentsPanel').innerHTML = `
  <div class="panel-header"><h2>💬 Comment Replies Needed</h2><span class="count">${D.comments.length}</span></div>
  <div class="panel-body">${D.comments.map(c => `
    <div class="comment-card">
      <div class="card-header">
        <div><div class="name">${c.commenter}</div>${c.title ? `<div class="title">${c.title}</div>` : ''}</div>
        <span class="time">${c.timeAgo}</span>
      </div>
      <div class="post-ref">on: ${c.postTitle}</div>
      <div class="comment-text">"${c.commentText}"</div>
      <div class="reply-options">${c.replies.map((r, i) => `
        <div class="reply-option">
          <div class="tone">${r.tone}</div>
          <div class="reply-text" contenteditable="true" id="comment-${D.comments.indexOf(c)}-${i}">${r.text}</div>
          <div class="btn-row">
            <button class="btn btn-gold" onclick="copyText(document.getElementById('comment-${D.comments.indexOf(c)}-${i}').innerText, '${c.postUrl}')">📋 Copy & Open</button>
          </div>
        </div>
      `).join('')}</div>
    </div>
  `).join('')}</div>
`;

// Feed Engagement Panel
const sortedFeed = [...D.feedEngagement].sort((a, b) => {
  const order = { client: 0, outsider: 1, peer: 2 };
  return (order[a.category] || 2) - (order[b.category] || 2);
});
document.getElementById('feedPanel').innerHTML = `
  <div class="panel-header"><h2>🎯 Feed Engagement</h2><span class="count">${D.feedEngagement.length}</span></div>
  <div class="panel-body">${sortedFeed.map((f, fi) => `
    <div class="feed-card">
      <div class="card-header">
        <div><div class="name">${f.author}</div><div class="title">${f.authorTitle}</div></div>
        <div style="text-align:right"><span class="cat ${catClass(f.category)}">${catLabel(f.category)}</span><br><span class="time">${f.timeAgo}</span></div>
      </div>
      <div class="snippet">"${f.snippet}"</div>
      <div class="why">💡 ${f.why}</div>
      <div class="stats-line">${f.stats}</div>
      <div class="reply-option">
        <div class="tone">Suggested Comment</div>
        <div class="reply-text" contenteditable="true" id="feed-${fi}">${f.suggestedComment}</div>
        <div class="btn-row">
          <button class="btn btn-gold" onclick="copyText(document.getElementById('feed-${fi}').innerText, '${f.url}')">📋 Copy & Open</button>
        </div>
      </div>
    </div>
  `).join('')}</div>
`;

// Post Queue Panel
document.getElementById('queuePanel').innerHTML = `
  <div class="panel-header"><h2>📅 Post Queue — Next 2 Weeks</h2><span class="count">${D.postQueue.length}</span></div>
  <div class="panel-body">${D.postQueue.map((p, pi) => `
    <div class="queue-item">
      <div class="queue-header" onclick="let b=this.nextElementSibling;b.classList.toggle('open');this.querySelector('.arrow').classList.toggle('open')">
        <span class="queue-date">${p.date}</span>
        <span class="queue-title">${p.title}</span>
        <span class="queue-status ${statusClass(p.status)}">${p.status}</span>
        <span class="arrow">▶</span>
      </div>
      <div class="queue-body">
        <div class="category-tag">${p.category} · ${p.dayLabel}</div>
        <div class="full-text" contenteditable="true" id="post-${pi}">${p.fullText}</div>
        <div class="btn-row" style="margin-top:10px">
          <button class="btn btn-gold" onclick="copyText(document.getElementById('post-${pi}').innerText)">📋 Copy Full Post</button>
          <button class="btn btn-outline" onclick="event.stopPropagation()">✅ Mark Ready</button>
        </div>
      </div>
    </div>
  `).join('')}</div>
`;

// Connections Panel
document.getElementById('connectionsPanel').innerHTML = `
  <div class="panel-header"><h2>🔗 Connection Suggestions</h2><span class="count">${D.connections.length}</span></div>
  <div class="panel-body">${D.connections.map((c, ci) => `
    <div class="connection-card">
      <div class="card-header">
        <div><div class="name">${c.name}</div><div class="title">${c.title}</div></div>
        <span class="cat ${catClass(c.category)}">${catLabel(c.category)}</span>
      </div>
      <div class="why">💡 ${c.why}</div>
      <div class="conn-messages">${c.messages.map((m, mi) => `
        <div class="conn-msg">
          <div class="tone">${m.tone}</div>
          <div class="msg-text" contenteditable="true" id="conn-${ci}-${mi}">${m.text}</div>
          <div class="btn-row">
            <button class="btn btn-gold" onclick="copyText(document.getElementById('conn-${ci}-${mi}').innerText, '${c.profileUrl}')">📋 Copy & Open</button>
          </div>
        </div>
      `).join('')}</div>
    </div>
  `).join('')}</div>
`;

// Performance Panel
document.getElementById('performancePanel').innerHTML = `
  <div class="panel-header"><h2>📈 Post Performance</h2><span class="count">${D.performance.length}</span></div>
  <div class="panel-body">
    <table class="perf-table">
      <thead><tr><th>Post</th><th>Date</th><th>Impressions</th><th>Reactions</th><th>Comments</th></tr></thead>
      <tbody>${D.performance.map(p => `
        <tr>
          <td>${p.title}</td>
          <td style="color:var(--text-muted)">${p.date}</td>
          <td style="color:var(--gold);font-weight:600">${p.impressions.toLocaleString()}</td>
          <td>${p.reactions}</td>
          <td>${p.comments}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  </div>
`;
</script>
</body>
